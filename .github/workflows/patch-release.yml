name: Patch Release

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for patch release (optional, shown in tag annotation)"
        required: false
        default: ""

concurrency:
  group: patch-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ---------- Job 0: compute next patch version ----------
  versions:
    name: Compute Patch Version
    runs-on: ubuntu-latest
    outputs:
      next-tag: ${{ steps.calc.outputs.next_tag }}
      next-version: ${{ steps.calc.outputs.next_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: calc
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]{4}\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            echo "::error::No HA-style tag found (vYYYY.M.PATCH). Run auto-release first."
            exit 1
          fi
          echo "Latest tag: ${latest}"
          ver=$(echo "$latest" | sed 's/^v//')
          yyyy=$(echo "$ver" | cut -d. -f1)
          m=$(echo "$ver" | cut -d. -f2)
          patch=$(echo "$ver" | cut -d. -f3)
          next_patch=$((patch + 1))
          next_tag="v${yyyy}.${m}.${next_patch}"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${yyyy}.${m}.${next_patch}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          tag="${{ steps.calc.outputs.next_tag }}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi
          echo "Next patch tag: ${tag}"

  # ---------- Job 1: test matrix ----------
  test:
    name: Test (HA ${{ matrix.ha-version }})
    needs: versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ha-version: [stable, prev]
        include:
          - ha-version: stable
            required: true
          - ha-version: prev
            required: true
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --extra dev
          uv pip install git+https://github.com/hemm-ems/hemm.git

      - name: Lint
        run: |
          uv run ruff check custom_components/ tests/
          uv run ruff format --check custom_components/ tests/

      - name: Unit tests
        run: uv run pytest --cov=custom_components/hemm --cov-report=term-missing

      - name: Compute HA image tag
        id: image
        run: |
          case "${{ matrix.ha-version }}" in
            prev)
              tag=$(date -d "$(date +%Y-%m-01) -1 month" +%Y.%-m)
              ;;
            *)
              tag="${{ matrix.ha-version }}"
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Start HA container
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 3
        env:
          HA_VERSION: ${{ steps.image.outputs.tag }}

      - name: Install hemm + companion inside container
        run: |
          docker exec hemm-ha-test pip install --quiet git+https://github.com/hemm-ems/hemm.git
          docker exec hemm-ha-test pip install --quiet git+https://github.com/hemm-ems/hactl-companion.git

      - name: Restart HA and wait for health
        run: |
          docker restart hemm-ha-test
          for i in $(seq 1 60); do
            if curl -so /dev/null http://localhost:8123/api/onboarding 2>/dev/null; then
              echo "HA healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8123/api/onboarding || { echo "::error::HA not healthy"; exit 1; }
        timeout-minutes: 3

      - name: Start companion
        run: |
          docker exec -d hemm-ha-test sh -c 'SUPERVISOR_TOKEN=integration-test-token-12345 python3 -m companion'
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9100/v1/health >/dev/null 2>&1; then
              echo "Companion healthy after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Container tests
        run: uv run pytest tests/integration/ --tb=short -v -o "addopts="
        env:
          SKIP_DOCKER_COMPOSE: "1"
          HA_BASE_URL: http://localhost:8123

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  # ---------- Job 2: tag + release ----------
  release:
    name: Release ${{ needs.versions.outputs.next-tag }}
    needs: [versions, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          tag="${{ needs.versions.outputs.next-tag }}"
          reason="${{ inputs.reason }}"
          msg="Patch release ${tag}"
          if [ -n "$reason" ]; then
            msg="${msg} — ${reason}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "${msg}"
          git push origin "${tag}"
