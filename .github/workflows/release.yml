name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Build HACS zip
        # HACS extracts the zip's contents into config/custom_components/<domain>/,
        # so the integration files must sit at the zip ROOT (not nested in hemm/).
        # The asset name must be STATIC — current HACS does not template the
        # hacs.json "filename" field; it is matched literally against the release
        # asset under the tag's download path.
        run: |
          cd custom_components/hemm
          zip -r ../../hemm-ha.zip . -x '*__pycache__*' '*.pyc'

      - name: Extract changelog for this version
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          notes=$(awk "/^## \[${tag}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="Release ${tag}"
          fi
          echo "$notes" > release-notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            hemm-ha.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
