services:
  homeassistant:
    image: "ghcr.io/home-assistant/home-assistant:${HA_VERSION:-2025.4}"
    container_name: hemm-ha-test
    volumes:
      - ./custom_components/hemm:/config/custom_components/hemm:ro
      - ./tests/integration/config:/config:rw
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: "no"
