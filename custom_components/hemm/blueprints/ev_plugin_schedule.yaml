blueprint:
  name: "HEMM — EV Plug-In Auto-Schedule"
  description: >
    Detects when an EV is plugged in (via a binary sensor) and automatically
    adds a min_soc_until constraint with the configured departure time and
    target SoC. Triggers a replan so the optimizer schedules cheap charging
    overnight.
  domain: automation
  input:
    plug_sensor:
      name: Plug State Sensor
      description: Binary sensor that turns on when the EV is plugged in.
      selector:
        entity:
          domain: binary_sensor
    device_id:
      name: EV Charger Device ID
      description: The HEMM device_id of your EV charger.
      selector:
        text:
    departure_time:
      name: Departure Time
      description: "When you need the car ready (e.g., 07:00)."
      default: "07:00:00"
      selector:
        time:
    target_soc:
      name: Target SoC (%)
      description: Desired state of charge at departure.
      default: 80
      selector:
        number:
          min: 20
          max: 100
          step: 5
          unit_of_measurement: "%"
    priority:
      name: Priority Penalty
      description: Higher values make the optimizer prioritize charging.
      default: 5.0
      selector:
        number:
          min: 1
          max: 20
          step: 0.5

trigger:
  - platform: state
    entity_id: !input plug_sensor
    to: "on"

condition: []

action:
  - variables:
      departure: !input departure_time
      tomorrow: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"
      deadline_iso: "{{ tomorrow }}T{{ departure }}{{ now().strftime('%z') }}"
  - service: hemm.add_constraint_window
    data:
      window_id: "ev_charge_{{ now().strftime('%Y%m%d_%H%M') }}"
      device_id: !input device_id
      deadline: "{{ deadline_iso }}"
      requirement_type: min_soc_until
      requirement_params:
        min_soc_pct: !input target_soc
      priority_penalty: !input priority
  - service: hemm.replan
    data: {}

mode: single
