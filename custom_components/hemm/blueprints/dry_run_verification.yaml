blueprint:
  name: "HEMM — Dry-Run Verification"
  description: >
    Periodically runs a dry-run solver pass and sends a notification with the
    result. Use this to monitor optimizer health without affecting the live
    plan. Listens for hemm_dry_run_completed events and reports status,
    solve time, and plan count.
  domain: automation
  input:
    interval_hours:
      name: Interval (hours)
      description: How often to run the dry-run check.
      default: 4
      selector:
        number:
          min: 1
          max: 24
          step: 1
    notify_service:
      name: Notification Service
      description: "The notification service to call (e.g., notify.mobile_app)."
      default: "notify.persistent_notification"
      selector:
        text:

trigger:
  - platform: time_pattern
    hours: !input interval_hours

action:
  - service: hemm.simulate
    data: {}
  - wait_for_trigger:
      - platform: event
        event_type: hemm_dry_run_completed
    timeout: "00:05:00"
    continue_on_timeout: true
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none }}"
        sequence:
          - service: !input notify_service
            data:
              title: "HEMM Dry-Run Result"
              message: >
                Status: {{ wait.trigger.event.data.status }}
                Solver: {{ wait.trigger.event.data.solver }}
                Solve time: {{ wait.trigger.event.data.solve_time | round(2) }}s
                Plans: {{ wait.trigger.event.data.plan_count }}
    default:
      - service: !input notify_service
        data:
          title: "HEMM Dry-Run Timeout"
          message: "Dry-run did not complete within 5 minutes. Check HEMM logs."

mode: single
