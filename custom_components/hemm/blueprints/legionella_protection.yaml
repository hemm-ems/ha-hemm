blueprint:
  name: "HEMM — Legionella Protection"
  description: >
    Adds a reach_min_temp_once constraint to a water heater device at a fixed
    weekly schedule. Ensures the tank reaches 60 °C at least once per cycle
    to prevent Legionella growth. Fires hemm.add_constraint_window with a
    6-hour deadline and high priority.
  domain: automation
  input:
    device_id:
      name: Water Heater Device ID
      description: The HEMM device_id of your water heater.
      selector:
        text:
    schedule_time:
      name: Schedule Time
      description: "Time of day to start the legionella cycle (e.g., 03:00)."
      default: "03:00:00"
      selector:
        time:
    target_temp_c:
      name: Target Temperature (°C)
      description: Minimum temperature the tank must reach.
      default: 60.0
      selector:
        number:
          min: 55
          max: 70
          step: 1
          unit_of_measurement: "°C"
    priority:
      name: Priority Penalty
      description: Higher values make the optimizer prioritize this constraint.
      default: 8.0
      selector:
        number:
          min: 1
          max: 20
          step: 0.5

trigger:
  - platform: time
    at: !input schedule_time

action:
  - service: hemm.add_constraint_window
    data:
      window_id: "legionella_{{ now().strftime('%Y%m%d') }}"
      device_id: !input device_id
      deadline: "{{ (now() + timedelta(hours=6)).isoformat() }}"
      requirement_type: reach_min_temp_once
      requirement_params:
        min_temp_c: !input target_temp_c
      priority_penalty: !input priority
  - service: hemm.replan
    data: {}

mode: single
